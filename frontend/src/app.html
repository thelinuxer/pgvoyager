<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- SVG favicon scales sharply at every size; the PNGs are
		     fallbacks. Sizes are corrected from the previous (wrong)
		     declarations so Chrome doesn't try to upscale favicon-32 to
		     fill a 64x64 slot. -->
		<link rel="icon" type="image/svg+xml" href="/logo.svg?v=5" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=5" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=5" />
		<link rel="icon" type="image/png" sizes="256x256" href="/favicon.png?v=5" />
		<title>PgVoyager</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
